# 本地开发用 PostgreSQL 16。
# 用法：docker compose up -d  启动；docker compose down 停止；docker compose down -v 连数据一起清空。
# 生产环境不用本文件（线上用 ECS 上 apt 安装的 Postgres）。
services:
  db:
    image: postgres:16
    container_name: pnr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pnr
      POSTGRES_PASSWORD: pnr_dev_pw
      POSTGRES_DB: pnr_dev
    ports:
      - "5432:5432"
    volumes:
      - pnr-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pnr -d pnr_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pnr-pgdata:
