# Nginx 站点配置：pnr.windfcy.fun
# 部署位置：/etc/nginx/sites-available/pnr.windfcy.fun
#   sudo ln -s /etc/nginx/sites-available/pnr.windfcy.fun /etc/nginx/sites-enabled/
# 说明：初始只配 80 端口；certbot --nginx 会自动补 443 + 证书 + 80→443 跳转。
#
# 前端静态由 Nginx 直接托管 dist/（SPA 用 try_files 回退 index.html）；
# 只有 /api/ 反代到 Node（127.0.0.1:3001）。

server {
    listen 80;
    listen [::]:80;
    server_name pnr.windfcy.fun;

    # 前端构建产物
    root /var/www/pickandreturn/dist;
    index index.html;

    # 上传/请求体上限（本应用请求都很小）
    client_max_body_size 1m;

    # 前端路由（BrowserRouter）：找不到实体文件就回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反代到 Node
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 关键：把真实客户端 IP 传给 Node，配合 app.set('trust proxy', 1)，
        # 否则限流会退化成全站单桶（见 Phase D 安全修复 H1）
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存（带 hash 的构建产物可长缓存）
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
